name: nightly-dockerbuild

on:
  workflow_dispatch:
  push:
    branches:
      - nightly
    paths:
      - "**"
      - "!.github/**"
      - "!**.md"
      - "!docker-compose.yml"
permissions:
  contents: read
  packages: write

jobs:
  main:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: orborus
            path: ./
            version: nightly
            experimental: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: "amd64,arm64,arm"

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Ghcr Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}/
          file: ${{ matrix.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/shuffle/${{ matrix.app }}:${{ matrix.version }}
            ghcr.io/shuffle-orborus/shuffle-${{ matrix.app }}:${{ matrix.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/shuffle-${{ matrix.app }}:${{ matrix.version }}
            shuffle-orborus/shuffle-${{ matrix.app }}:${{ matrix.version }}
            frikky/shuffle-${{ matrix.app }}:${{ matrix.version }}
            frikky/shuffle:${{ matrix.app }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
